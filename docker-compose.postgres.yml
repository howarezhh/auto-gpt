services:
  postgres:
    image: postgres:16
    container_name: aotu-gpt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aotu_gpt
      POSTGRES_USER: aotu_gpt
      POSTGRES_PASSWORD: zhh123456
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - aotu_gpt_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aotu_gpt -d aotu_gpt"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7
    container_name: aotu-gpt-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - aotu_gpt_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  aotu_gpt_postgres_data:
  aotu_gpt_redis_data:
