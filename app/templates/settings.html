{% extends "base.html" %}
{% block content %}
<section class="page-heading">
    <div>
        <div class="eyebrow">路由设置</div>
        <h2>路由设置</h2>
        <p>统一配置默认路由模式、重试策略、熔断阈值与自动健康检查参数。</p>
    </div>
</section>

<section class="panel-card section-shell">
    <div class="section-subhead">
        <div>
            <div class="panel-kicker">路由策略</div>
            <h3>全局路由策略</h3>
        </div>
    </div>
    <form class="form-grid" id="settings-form">
        <label>
            <span>路由模式</span>
            <select class="field-input" id="setting-route-mode">
                <option value="manual">手动优先 | 固定默认中转优先</option>
                <option value="failover">故障切换 | 默认中转失败自动切换</option>
                <option value="weighted">权重分流 | 按权重首选自动分流</option>
                <option value="sticky">会话粘滞 | 同会话优先命中同一中转</option>
            </select>
        </label>
        <label>
            <span>默认中转站</span>
            <select class="field-input" id="setting-default-provider-id"></select>
        </label>
        <label>
            <span>全局超时毫秒</span>
            <input class="field-input" id="setting-global-timeout-ms" type="number">
        </label>
        <label>
            <span>全局最大重试次数</span>
            <input class="field-input" id="setting-global-max-retries" type="number">
        </label>
        <label>
            <span>熔断阈值</span>
            <input class="field-input" id="setting-circuit-breaker-threshold" type="number">
        </label>
        <label>
            <span>健康检查间隔秒</span>
            <input class="field-input" id="setting-health-check-interval-sec" type="number">
        </label>
        <label>
            <span>恢复探测间隔秒</span>
            <input class="field-input" id="setting-recovery-probe-interval-sec" type="number">
        </label>
        <label>
            <span>日志正文最大字节数</span>
            <input class="field-input" id="setting-max-logged-body-bytes" type="number">
        </label>
        <label>
            <span>请求日志保留天数</span>
            <input class="field-input" id="setting-request-log-retention-days" type="number" min="0">
        </label>
        <label>
            <span>审计日志保留天数</span>
            <input class="field-input" id="setting-admin-audit-log-retention-days" type="number" min="0">
        </label>
        <div class="form-span-2 settings-switch-grid">
            <label class="settings-switch-card">
                <span class="settings-switch-copy">
                    <strong>手动优先模式允许失败后回退</strong>
                </span>
                <span class="settings-switch-control">
                    <input id="setting-manual-allow-fallback" type="checkbox">
                    <span class="settings-switch-slider"></span>
                </span>
            </label>
            <label class="settings-switch-card">
                <span class="settings-switch-copy">
                    <strong>启用自动健康检查</strong>
                </span>
                <span class="settings-switch-control">
                    <input id="setting-auto-health-check" type="checkbox">
                    <span class="settings-switch-slider"></span>
                </span>
            </label>
            <label class="settings-switch-card">
                <span class="settings-switch-copy">
                    <strong>记录 token 使用量</strong>
                </span>
                <span class="settings-switch-control">
                    <input id="setting-enable-token-logging" type="checkbox">
                    <span class="settings-switch-slider"></span>
                </span>
            </label>
            <label class="settings-switch-card">
                <span class="settings-switch-copy">
                    <strong>记录请求与响应正文</strong>
                </span>
                <span class="settings-switch-control">
                    <input id="setting-enable-payload-logging" type="checkbox">
                    <span class="settings-switch-slider"></span>
                </span>
            </label>
            <label class="settings-switch-card">
                <span class="settings-switch-copy">
                    <strong>记录流式最终回复文本</strong>
                </span>
                <span class="settings-switch-control">
                    <input id="setting-enable-stream-response-persist" type="checkbox">
                    <span class="settings-switch-slider"></span>
                </span>
            </label>
            <label class="settings-switch-card">
                <span class="settings-switch-copy">
                    <strong>日志中脱敏敏感字段</strong>
                </span>
                <span class="settings-switch-control">
                    <input id="setting-mask-sensitive-fields" type="checkbox">
                    <span class="settings-switch-slider"></span>
                </span>
            </label>
            <label class="settings-switch-card">
                <span class="settings-switch-copy">
                    <strong>允许公开注册普通用户</strong>
                </span>
                <span class="settings-switch-control">
                    <input id="setting-allow-public-user-registration" type="checkbox">
                    <span class="settings-switch-slider"></span>
                </span>
            </label>
        </div>
        <div class="form-actions form-span-2">
            <button class="btn btn-accent interactive-btn" id="settings-submit-btn" type="submit">保存设置</button>
        </div>
    </form>
</section>
{% endblock %}
