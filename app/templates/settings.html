{% extends "base.html" %}
{% block content %}
<section class="page-heading">
    <div>
        <div class="eyebrow">路由设置</div>
        <h2>路由设置</h2>
        <p>统一配置默认路由模式、重试策略、熔断阈值，以及自动健康检查与恢复探测参数。</p>
    </div>
</section>

<section class="panel-card section-shell">
    <div class="section-subhead">
        <div>
            <div class="panel-kicker">路由策略</div>
            <h3>全局路由策略</h3>
        </div>
    </div>
    <form class="form-grid" id="settings-form">
        <label>
            <span>路由模式</span>
            <select class="field-input" id="setting-route-mode">
                <option value="manual">手动优先 | 固定默认中转优先</option>
                <option value="failover">故障切换 | 默认中转失败自动切换</option>
                <option value="weighted">权重分流 | 按权重首选自动分流</option>
                <option value="sticky">会话粘滞 | 同会话优先命中同一中转</option>
            </select>
        </label>
        <label>
            <span>默认中转站</span>
            <select class="field-input" id="setting-default-provider-id"></select>
        </label>
        <label>
            <span>全局超时（ms）</span>
            <input class="field-input" id="setting-global-timeout-ms" type="number">
        </label>
        <label>
            <span>全局最大重试次数</span>
            <input class="field-input" id="setting-global-max-retries" type="number">
        </label>
        <div class="form-span-2 settings-group" aria-labelledby="settings-health-group-title">
            <div class="settings-group-head">
                <div class="panel-kicker">健康治理</div>
                <h4 id="settings-health-group-title">自动健康检查</h4>
            </div>
            <div class="form-grid settings-subgrid settings-health-grid">
                <label class="settings-switch-card settings-health-switch-card">
                    <span class="settings-switch-copy">
                        <span class="settings-switch-title-row">
                            <strong>启用自动健康检查</strong>
                            <span class="settings-help">
                                <button class="settings-help-btn" type="button" aria-label="查看自动健康检查说明" data-settings-tooltip-trigger="true">
                                    <i class="bi bi-question-circle" aria-hidden="true"></i>
                                </button>
                                <div class="settings-tooltip-content hidden">
                                    <div class="settings-tooltip-title">自动健康检查说明</div>
                                    <div class="settings-tooltip-copy">开启后，后台定时任务会按设定间隔主动巡检已启用中转站及其模型可用性，并同步更新健康状态、最近检查时间与相关健康检查日志。默认关闭，建议仅在你需要后台持续巡检并接受额外上游探测流量时启用。</div>
                                </div>
                            </span>
                        </span>
                        <small>默认关闭；需要后台持续巡检时再开启。</small>
                    </span>
                    <span class="settings-switch-control">
                        <input id="setting-auto-health-check" type="checkbox">
                        <span class="settings-switch-slider"></span>
                    </span>
                </label>
                <label>
                    <span class="settings-field-label">
                        <span>自动健康检查间隔（s）</span>
                        <span class="settings-help">
                            <button class="settings-help-btn" type="button" aria-label="查看自动健康检查间隔说明" data-settings-tooltip-trigger="true">
                                <i class="bi bi-question-circle" aria-hidden="true"></i>
                            </button>
                            <div class="settings-tooltip-content hidden">
                                <div class="settings-tooltip-title">自动健康检查间隔说明</div>
                                <div class="settings-tooltip-copy">表示后台两轮自动巡检之间的最小间隔。当前系统下限为 300 s，用于避免高频探测上游接口、放大失败噪声或产生不必要的 token 与请求消耗。值越小，状态更新越及时；值越大，对上游更温和。</div>
                            </div>
                        </span>
                    </span>
                    <input class="field-input" id="setting-health-check-interval-sec" type="number" min="300">
                </label>
                <label>
                    <span class="settings-field-label">
                        <span>恢复探测间隔（s）</span>
                        <span class="settings-help">
                            <button class="settings-help-btn" type="button" aria-label="查看恢复探测间隔说明" data-settings-tooltip-trigger="true">
                                <i class="bi bi-question-circle" aria-hidden="true"></i>
                            </button>
                            <div class="settings-tooltip-content hidden">
                                <div class="settings-tooltip-title">恢复探测间隔说明</div>
                                <div class="settings-tooltip-copy">当中转站或模型因失败被标记为不可用后，系统会按这里的间隔安排恢复性探测，判断它是否可以重新回到候选路由。这个值越短，恢复更积极；越长则更保守，适合波动较大的上游。</div>
                            </div>
                        </span>
                    </span>
                    <input class="field-input" id="setting-recovery-probe-interval-sec" type="number">
                </label>
            </div>
        </div>
        <div class="form-span-2 settings-group" aria-labelledby="settings-token-group-title">
            <div class="settings-group-head">
                <div class="panel-kicker">tok</div>
                <h4 id="settings-token-group-title">模型 / 路由限制（tok）</h4>
            </div>
            <div class="form-grid settings-subgrid">
                <label>
                    <span>全局最大请求（tok）</span>
                    <input class="field-input" id="setting-global-max-request-tokens" type="number" min="0" placeholder="0 表示不限制">
                </label>
                <label>
                    <span>长输出非流式阈值（tok）</span>
                    <input class="field-input" id="setting-long-output-stream-threshold-tokens" type="number" min="0" placeholder="0 表示不强制">
                </label>
            </div>
        </div>
        <div class="form-span-2 settings-group" aria-labelledby="settings-bytes-group-title">
            <div class="settings-group-head">
                <div class="panel-kicker">B</div>
                <h4 id="settings-bytes-group-title">请求 / 日志 / 缓存限制（B）</h4>
            </div>
            <div class="form-grid settings-subgrid">
                <label>
                    <span>/v1 请求体最大字节数（B）</span>
                    <input class="field-input" id="setting-max-v1-request-body-bytes" type="number" min="0" placeholder="0 表示不限制">
                </label>
                <label>
                    <span>Chat 请求体最大字节数（B）</span>
                    <input class="field-input" id="setting-max-v1-chat-request-body-bytes" type="number" min="0" placeholder="0 表示沿用 /v1 上限">
                </label>
                <label>
                    <span>Responses 请求体最大字节数（B）</span>
                    <input class="field-input" id="setting-max-v1-responses-request-body-bytes" type="number" min="0" placeholder="0 表示沿用 /v1 上限">
                </label>
                <label>
                    <span>非流式响应最大字节数（B）</span>
                    <input class="field-input" id="setting-max-non-stream-response-body-bytes" type="number" min="0" placeholder="0 表示不限制">
                </label>
                <label>
                    <span>流式统计缓存字节数（B）</span>
                    <input class="field-input" id="setting-stream-token-capture-max-bytes" type="number" min="0" placeholder="0 表示不缓存输出文本">
                </label>
                <label>
                    <span>日志 metadata 最大字节数（B）</span>
                    <input class="field-input" id="setting-max-logged-metadata-bytes" type="number" min="0" placeholder="0 表示只保留摘要">
                </label>
                <label>
                    <span>日志正文最大字节数（B）</span>
                    <input class="field-input" id="setting-max-logged-body-bytes" type="number">
                </label>
            </div>
        </div>
        <label>
            <span>熔断阈值</span>
            <input class="field-input" id="setting-circuit-breaker-threshold" type="number">
        </label>
        <label>
            <span>请求日志保留（d）</span>
            <input class="field-input" id="setting-request-log-retention-days" type="number" min="0">
        </label>
        <label>
            <span>审计日志保留（d）</span>
            <input class="field-input" id="setting-admin-audit-log-retention-days" type="number" min="0">
        </label>
        <label>
            <span>全局最大活跃请求</span>
            <input class="field-input" id="setting-global-max-active-requests" type="number" min="0">
        </label>
        <label>
            <span>全局最大流式请求</span>
            <input class="field-input" id="setting-global-max-active-streams" type="number" min="0">
        </label>
        <label>
            <span>单密钥最大活跃请求</span>
            <input class="field-input" id="setting-api-key-max-active-requests" type="number" min="0">
        </label>
        <label>
            <span>单密钥最大流式请求</span>
            <input class="field-input" id="setting-api-key-max-active-streams" type="number" min="0">
        </label>
        <label>
            <span>单账户最大活跃请求</span>
            <input class="field-input" id="setting-account-max-active-requests" type="number" min="0">
        </label>
        <label>
            <span>单账户最大流式请求</span>
            <input class="field-input" id="setting-account-max-active-streams" type="number" min="0">
        </label>
        <label>
            <span>单中转最大活跃请求</span>
            <input class="field-input" id="setting-provider-max-active-requests" type="number" min="0">
        </label>
        <label>
            <span>单中转最大流式请求</span>
            <input class="field-input" id="setting-provider-max-active-streams" type="number" min="0">
        </label>
        <label>
            <span>并发租约 TTL（s）</span>
            <input class="field-input" id="setting-concurrency-lease-ttl-seconds" type="number" min="60">
        </label>
        <div class="form-span-2 settings-switch-grid">
            <label class="settings-switch-card">
                <span class="settings-switch-copy">
                    <strong>手动优先模式允许失败后回退</strong>
                </span>
                <span class="settings-switch-control">
                    <input id="setting-manual-allow-fallback" type="checkbox">
                    <span class="settings-switch-slider"></span>
                </span>
            </label>
            <label class="settings-switch-card">
                <span class="settings-switch-copy">
                    <strong>记录 token 使用量</strong>
                </span>
                <span class="settings-switch-control">
                    <input id="setting-enable-token-logging" type="checkbox">
                    <span class="settings-switch-slider"></span>
                </span>
            </label>
            <label class="settings-switch-card">
                <span class="settings-switch-copy">
                    <strong>记录请求与响应正文</strong>
                </span>
                <span class="settings-switch-control">
                    <input id="setting-enable-payload-logging" type="checkbox">
                    <span class="settings-switch-slider"></span>
                </span>
            </label>
            <label class="settings-switch-card">
                <span class="settings-switch-copy">
                    <strong>记录流式最终回复文本</strong>
                </span>
                <span class="settings-switch-control">
                    <input id="setting-enable-stream-response-persist" type="checkbox">
                    <span class="settings-switch-slider"></span>
                </span>
            </label>
            <label class="settings-switch-card">
                <span class="settings-switch-copy">
                    <strong>日志中脱敏敏感字段</strong>
                </span>
                <span class="settings-switch-control">
                    <input id="setting-mask-sensitive-fields" type="checkbox">
                    <span class="settings-switch-slider"></span>
                </span>
            </label>
            <label class="settings-switch-card">
                <span class="settings-switch-copy">
                    <strong>允许公开注册普通用户</strong>
                </span>
                <span class="settings-switch-control">
                    <input id="setting-allow-public-user-registration" type="checkbox">
                    <span class="settings-switch-slider"></span>
                </span>
            </label>
        </div>
        <div class="form-actions form-span-2">
            <button class="btn btn-accent interactive-btn" id="settings-submit-btn" type="submit">保存设置</button>
        </div>
    </form>
</section>
{% endblock %}
