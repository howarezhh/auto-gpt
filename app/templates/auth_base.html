<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "认证" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', path='css/app.css') }}?v=20260502-19" rel="stylesheet">
</head>
<body
    data-page="{{ page_name or '' }}"
    data-page-role="auth"
    data-authenticated="{{ 'true' if current_user else 'false' }}"
    data-user-role="{{ current_user.role if current_user else '' }}"
>
    <main class="auth-shell">
        {% block content %}{% endblock %}
    </main>
    <div class="toast-stack" id="toast-stack"></div>
    <script src="{{ url_for('static', path='js/app.js') }}?v=20260502-19"></script>
</body>
</html>
